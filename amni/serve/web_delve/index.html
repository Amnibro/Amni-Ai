<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Amni-Delve · in Adam</title>
<style>
:root{--bg:#0e1014;--panel:#161a22;--panel2:#1d222c;--line:#272d39;--tx:#e6e9ef;--mut:#98a2b3;--you:#38bdf8;--ok:#34d399;--bad:#f87171;--acc:#60a5fa}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{background:var(--bg);color:var(--tx);font:15px/1.5 ui-sans-serif,system-ui,Segoe UI,Roboto,Arial;display:flex;flex-direction:column}
header{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--line);background:var(--panel)}
.logo{font-weight:700;font-size:17px;letter-spacing:.3px}
.logo b{color:var(--acc)}
.sub{color:var(--mut);font-size:12px}
.badge{font-size:11px;color:var(--ok);border:1px solid var(--line);border-radius:999px;padding:2px 9px;background:var(--panel2)}
.spacer{flex:1}
.dot{width:9px;height:9px;border-radius:50%;background:var(--ok)}
.dot.busy{background:#fbbf24;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
.iconbtn{background:var(--panel2);color:var(--tx);border:1px solid var(--line);border-radius:9px;padding:7px 11px;cursor:pointer;font-size:14px}
.iconbtn:hover{border-color:#3a4252}
.estop{background:#3a1414;color:var(--bad);border:1px solid #5b1d1d;font-weight:700;border-radius:9px;padding:7px 13px;cursor:pointer;opacity:.5;pointer-events:none}
.estop.on{opacity:1;pointer-events:auto;animation:pulse 1.2s infinite}
.estop.on:hover{background:#511a1a}
main{flex:1;overflow-y:auto;padding:22px 0}
.wrap{max-width:860px;margin:0 auto;padding:0 18px}
.row{display:flex;gap:11px;margin:14px 0;align-items:flex-start}
.row.me{flex-direction:row-reverse}
.av{flex:none;width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-weight:700;font-size:13px;color:#0e1014;background:var(--mut)}
.bub{max-width:76%;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:9px 13px}
.row.me .bub{background:#10222e;border-color:#1c3a4d}
.nm{font-size:12px;color:var(--mut);margin:0 0 3px}
.bub .body{white-space:normal;word-wrap:break-word}
.bub pre{background:#0b0d11;border:1px solid var(--line);border-radius:9px;padding:10px;overflow:auto;margin:7px 0}
.bub code{font-family:ui-monospace,Consolas,monospace;font-size:13px}
.bub :not(pre)>code{background:#0b0d11;border:1px solid var(--line);border-radius:5px;padding:1px 5px}
.bub a{color:var(--acc)}
.chip{text-align:center;color:var(--mut);font-size:12px;margin:14px 0;text-transform:uppercase;letter-spacing:.6px}
.chip span{border:1px solid var(--line);border-radius:999px;padding:3px 12px;background:var(--panel)}
.learn{text-align:center;margin:12px 0}
.learn span{border:1px solid #1f3a2e;color:var(--ok);background:#0f1d17;border-radius:999px;padding:4px 13px;font-size:12px}
.think{display:flex;gap:5px;align-items:center;color:var(--mut);font-size:13px}
.think i{width:6px;height:6px;border-radius:50%;background:var(--mut);display:inline-block;animation:blink 1.2s infinite}
.think i:nth-child(2){animation-delay:.2s}
.think i:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
footer{border-top:1px solid var(--line);background:var(--panel);padding:12px 0}
.composer{max-width:860px;margin:0 auto;padding:0 18px;display:flex;flex-direction:column;gap:9px}
.tabs{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.tab{background:var(--panel2);color:var(--mut);border:1px solid var(--line);border-radius:999px;padding:5px 13px;cursor:pointer;font-size:13px}
.tab.on{color:var(--tx);border-color:var(--acc);background:#14233a}
.deb{display:flex;align-items:center;gap:6px;margin-left:auto;color:var(--mut);font-size:13px}
.deb input{width:46px;background:var(--panel2);color:var(--tx);border:1px solid var(--line);border-radius:7px;padding:5px;text-align:center}
.deb button{background:var(--panel2);color:var(--tx);border:1px solid var(--line);border-radius:8px;padding:6px 11px;cursor:pointer}
.deb button:hover{border-color:var(--acc)}
.inrow{display:flex;gap:9px;align-items:flex-end}
textarea{flex:1;resize:none;background:var(--panel2);color:var(--tx);border:1px solid var(--line);border-radius:11px;padding:11px 13px;font:inherit;max-height:180px;min-height:46px}
textarea:focus{outline:none;border-color:var(--acc)}
.send{background:var(--acc);color:#08111f;border:none;border-radius:11px;padding:0 18px;height:46px;font-weight:700;cursor:pointer}
.send:disabled{opacity:.5;cursor:default}
.send.interject{background:#fbbf24}
.hint{color:var(--mut);font-size:11px}
.drawer{position:fixed;top:0;right:0;height:100%;width:360px;max-width:90vw;background:var(--panel);border-left:1px solid var(--line);transform:translateX(100%);transition:.2s;padding:18px;overflow-y:auto;z-index:20}
.drawer.on{transform:none}
.drawer h3{margin:4px 0 10px;font-size:15px}
.drawer h4{margin:16px 0 6px;font-size:12px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px}
.fld{margin:11px 0}
.fld label{display:block;color:var(--mut);font-size:12px;margin-bottom:5px}
.fld input[type=text]{width:100%;background:var(--panel2);color:var(--tx);border:1px solid var(--line);border-radius:8px;padding:8px}
.ag{border:1px solid var(--line);border-radius:10px;padding:9px 11px;margin:8px 0;background:var(--panel2)}
.ag .top{display:flex;align-items:center;gap:8px}
.ag .nmrow{font-weight:600;flex:1}
.ag .st{font-size:11px;color:var(--mut)}
.ag .st.ready{color:var(--ok)}
.ag .st.off{color:var(--bad)}
.ag input[type=text]{width:100%;margin-top:7px;background:var(--bg);color:var(--tx);border:1px solid var(--line);border-radius:7px;padding:6px;font-size:13px}
.toggle{width:42px;height:23px;border-radius:999px;background:#333b49;position:relative;cursor:pointer;border:1px solid var(--line);flex:none}
.toggle.on{background:var(--ok)}
.toggle::after{content:"";position:absolute;top:2px;left:2px;width:17px;height:17px;border-radius:50%;background:#0e1014;transition:.15s}
.toggle.on::after{left:21px}
.sw{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line)}
.kv{color:var(--mut);font-size:12px;word-break:break-all;margin:6px 0}
.kv b{color:var(--tx);font-weight:600}
.dbtn{width:100%;background:var(--panel2);color:var(--tx);border:1px solid var(--line);border-radius:9px;padding:9px;cursor:pointer;margin-top:9px}
.dbtn:hover{border-color:var(--acc)}
.dbtn.danger:hover{border-color:var(--bad);color:var(--bad)}
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:.2s;z-index:15}
.scrim.on{opacity:1;pointer-events:auto}
</style>
</head>
<body>
<header>
<div class="logo">Amni·<b>Delve</b></div>
<div class="sub" id="rosterlbl">roundtable</div>
<div class="badge">subscription · keys stay in your env</div>
<div class="spacer"></div>
<div class="dot" id="dot" title="idle"></div>
<button class="estop" id="estop" title="Esc / e-stop">■ STOP</button>
<button class="iconbtn" id="gear" title="settings">⚙</button>
</header>
<main id="main"><div class="wrap" id="feed"></div></main>
<footer>
<div class="composer">
<div class="tabs" id="tabs"></div>
<div class="inrow">
<textarea id="box" placeholder="Message the room…  (Enter to send · Shift+Enter newline)"></textarea>
<button class="send" id="send">Send</button>
</div>
<div class="hint" id="hint">Type while they talk to interject · Esc or STOP to halt</div>
</div>
</footer>
<div class="scrim" id="scrim"></div>
<div class="drawer" id="drawer">
<h3>Settings</h3>
<div class="sw"><span>Bypass permissions (filesystem)</span><div class="toggle" id="tg-bypass"></div></div>
<div class="sw"><span>Teach Adam (PTEX learning)</span><div class="toggle" id="tg-ptex"></div></div>
<div class="sw"><span>Adam fallback (covers a down agent)</span><div class="toggle" id="tg-adam"></div></div>
<h4>Platforms <span style="text-transform:none;color:var(--mut)">· keys read from your env only</span></h4>
<div id="agents-panel"></div>
<button class="dbtn" id="commit">Commit lessons → Adam PTEX now</button>
<button class="dbtn danger" id="clear">Clear conversation</button>
<div class="kv" id="paths"></div>
</div>
<script>
const feed=document.getElementById("feed"),main=document.getElementById("main"),box=document.getElementById("box"),send=document.getElementById("send"),dot=document.getElementById("dot"),estop=document.getElementById("estop"),hint=document.getElementById("hint");
let target="all",busy=false,thinkEl=null,cfg={},agents=[],colors={};
function esc(t){return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function md(t){const b=[];t=esc(t||"");t=t.replace(/```([\s\S]*?)```/g,(m,c)=>{b.push(c.replace(/^\n/,""));return " "+(b.length-1)+" "});t=t.replace(/`([^`]+)`/g,"<code>$1</code>");t=t.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");t=t.replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');t=t.replace(/\n/g,"<br>");t=t.replace(/ (\d+) /g,(m,i)=>"<pre><code>"+b[+i]+"</code></pre>");return t}
function col(who){return who==="You"||who==="Anthony"?"var(--you)":(colors[who]||"var(--mut)")}
function atBottom(){return main.scrollHeight-main.scrollTop-main.clientHeight<120}
function scroll(){main.scrollTop=main.scrollHeight}
function bubble(who,text){const me=who==="Anthony"||who==="You";const nm=me?"You":who;const stick=atBottom();const row=document.createElement("div");row.className="row"+(me?" me":"");row.innerHTML='<div class="av" style="background:'+col(nm)+'">'+nm[0].toUpperCase()+'</div><div class="bub"><div class="nm" style="color:'+col(nm)+'">'+esc(nm)+'</div><div class="body">'+md(text)+"</div></div>";feed.appendChild(row);if(stick)scroll()}
function chip(t){const d=document.createElement("div");d.className="chip";d.innerHTML="<span>"+esc(t)+"</span>";feed.appendChild(d);if(atBottom())scroll()}
function learn(d){const n=d&&d.ok?("Adam learned · "+d.pairs+" pairs · "+(d.ledger_records||0)+" ledger"):("Adam: "+((d&&(d.reason||d.error))||"skipped"));const e=document.createElement("div");e.className="learn";e.innerHTML="<span>◆ "+esc(n)+"</span>";feed.appendChild(e);if(atBottom())scroll()}
function showThink(who){clearThink();const stick=atBottom();const row=document.createElement("div");row.className="row";row.innerHTML='<div class="av" style="background:'+col(who)+'">'+who[0].toUpperCase()+'</div><div class="bub"><div class="think">'+esc(who)+' is thinking <i></i><i></i><i></i></div></div>';feed.appendChild(row);thinkEl=row;if(stick)scroll()}
function clearThink(){if(thinkEl){thinkEl.remove();thinkEl=null}}
function setBusy(b){busy=b;dot.classList.toggle("busy",b);dot.title=b?"working":"idle";estop.classList.toggle("on",b);send.textContent=b?"Interject":"Send";send.classList.toggle("interject",b);hint.textContent=b?"They're talking — your line reaches them next turn · Esc/STOP halts":"Type while they talk to interject · Esc or STOP to halt"}
const ev=new EventSource("/api/delve/stream");
ev.onmessage=e=>{let m;try{m=JSON.parse(e.data)}catch(x){return}handle(m)};
function handle(m){const ty=m.type;
if(ty==="user"){bubble("You",m.text)}
else if(ty==="thinking"){setBusy(true);showThink(m.who)}
else if(ty==="msg"){clearThink();bubble(m.who,m.text)}
else if(ty==="status"){chip(m.text)}
else if(ty==="ptex"){learn(m.data)}
else if(ty==="estop"){clearThink();chip("e-stop — halted");setBusy(false)}
else if(ty==="idle"){clearThink();setBusy(false)}
else if(ty==="queued"){hint.textContent="queued — reaches them next turn"}
else if(ty==="cleared"){feed.innerHTML="";setBusy(false)}
else if(ty==="config"){cfg=m.config;paintCfg()}}
function selTarget(t){target=t;document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("on",x.dataset.t===t))}
function buildTabs(){const tabs=document.getElementById("tabs");const ros=agents.filter(a=>a.installed&&a.enabled);let h='<div class="tab" data-t="all">All</div>';if(ros.filter(a=>a.key!=="adam").length>=2)h+='<div class="tab" data-t="both">Both ⇄ review</div>';ros.forEach(a=>{h+='<div class="tab" data-t="'+a.key+'">'+esc(a.name)+'</div>'});h+='<div class="deb"><span>debate</span><input id="rounds" type="number" min="1" max="12" value="3"/><button id="debate">start ⟳</button></div>';tabs.innerHTML=h;document.querySelectorAll(".tab").forEach(x=>x.onclick=()=>selTarget(x.dataset.t));document.getElementById("debate").onclick=doDebate;if(!document.querySelector('.tab[data-t="'+target+'"]'))target="all";selTarget(target);document.getElementById("rosterlbl").textContent=ros.map(a=>a.name).join(" · ")||"no agents detected"}
async function post(url,body){try{const r=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body||{})});return await r.json()}catch(e){return{ok:false}}}
function doSend(){const t=box.value.trim();if(!t)return;box.value="";box.style.height="auto";post("/api/delve/send",{target:target,text:t})}
function doDebate(){const n=parseInt(document.getElementById("rounds").value)||3;const t=box.value.trim();box.value="";box.style.height="auto";post("/api/delve/send",{target:"debate",rounds:n,text:t})}
send.onclick=doSend;
estop.onclick=()=>post("/api/delve/estop",{});
box.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();doSend()}});
box.addEventListener("input",()=>{box.style.height="auto";box.style.height=Math.min(box.scrollHeight,180)+"px"});
document.addEventListener("keydown",e=>{if(e.key==="Escape"&&busy)post("/api/delve/estop",{})});
const drawer=document.getElementById("drawer"),scrim=document.getElementById("scrim");
function openDrawer(b){drawer.classList.toggle("on",b);scrim.classList.toggle("on",b)}
document.getElementById("gear").onclick=()=>openDrawer(true);
scrim.onclick=()=>openDrawer(false);
function tog(id,key){const el=document.getElementById(id);el.classList.toggle("on",!!cfg[key]);el.onclick=()=>{cfg[key]=!cfg[key];el.classList.toggle("on",cfg[key]);post("/api/delve/config",{[key]:cfg[key]})}}
function paintCfg(){document.getElementById("tg-bypass").classList.toggle("on",!!cfg.bypass);document.getElementById("tg-ptex").classList.toggle("on",!!cfg.ptex_learn);document.getElementById("tg-adam").classList.toggle("on",cfg.adam_fallback!==false)}
function enabledKeys(){return agents.filter(a=>a.enabled&&a.installed).map(a=>a.key)}
function setEnabled(key,on){const en=new Set(enabledKeys());on?en.add(key):en.delete(key);agents.forEach(a=>{if(a.key===key)a.enabled=on});post("/api/delve/config",{enabled:[...en]}).then(()=>{buildTabs();paintAgents()})}
function setModel(key,val){const models=Object.assign({},cfg.models||{});models[key]=val;cfg.models=models;post("/api/delve/config",{models:models})}
function paintAgents(){const p=document.getElementById("agents-panel");p.innerHTML="";agents.forEach(a=>{const d=document.createElement("div");d.className="ag";const auth=a.auth||{};const ready=a.installed&&auth.ready;const stcls=!a.installed?"off":(ready?"ready":"off");const stat=!a.installed?"not installed":(auth.ready?(auth.mode+(auth.keys_present&&auth.keys_present.length?(" · env: "+auth.keys_present.join(", ")):"")):("needs "+(a.auth&&a.auth.mode||"auth")));let inner='<div class="top"><span class="av" style="width:20px;height:20px;font-size:11px;background:'+(a.color||"var(--mut)")+'">'+a.name[0]+'</span><span class="nmrow">'+esc(a.name)+'</span><span class="st '+stcls+'">'+esc(stat)+'</span><div class="toggle'+(a.enabled?" on":"")+'" data-k="'+a.key+'"></div></div>';if(a.installed&&a.kind==="cli"){inner+='<input type="text" placeholder="'+(a.needs_model?("model (e.g. "+(a.default_model||"…")+")"):"model (blank = default)")+'" value="'+esc(a.model||"")+'" data-mk="'+a.key+'"/>'}d.innerHTML=inner;p.appendChild(d)});p.querySelectorAll(".toggle[data-k]").forEach(t=>t.onclick=()=>{const k=t.dataset.k;const a=agents.find(x=>x.key===k);if(!a.installed)return;setEnabled(k,!a.enabled)});p.querySelectorAll("input[data-mk]").forEach(i=>i.onchange=()=>setModel(i.dataset.mk,i.value.trim()))}
document.getElementById("clear").onclick=()=>{if(confirm("Clear the conversation?"))post("/api/delve/clear",{})};
document.getElementById("commit").onclick=()=>post("/api/delve/commit",{}).then(r=>learn(r&&r.ok?{ok:true,pairs:r.committed||0,ledger_records:0}:r));
async function init(){const r=await fetch("/api/delve/state");const st=await r.json();cfg=st.config||{};agents=st.agents||[];colors={};agents.forEach(a=>colors[a.name]=a.color);buildTabs();(st.transcript||[]).forEach(x=>bubble(x.who,x.text));tog("tg-bypass","bypass");tog("tg-ptex","ptex_learn");tog("tg-adam","adam_fallback");paintCfg();paintAgents();document.getElementById("paths").innerHTML="Adam: <b>in-process</b> · keys never leave your env";setBusy(!!st.busy);scroll()}
init();
</script>
</body>
</html>
