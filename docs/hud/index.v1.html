<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Adam HUD</title>
<style>
:root{--bg:#0a0a14;--panel:rgba(20,28,48,.7);--accent:#00d4ff;--accent2:#7c5cff;--ok:#10b981;--warn:#f59e0b;--err:#ef4444;--text:#e2e8f0;--dim:#94a3b8;--border:rgba(124,92,255,.3)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'SF Mono','Consolas',monospace;background:radial-gradient(ellipse at top,#1a1a2e 0%,#0a0a14 70%);color:var(--text);min-height:100vh;padding:16px;font-size:13px}
.grid{display:grid;grid-template-columns:1fr 1fr 380px;grid-template-rows:auto 1fr 220px;gap:12px;height:calc(100vh - 32px);grid-template-areas:"header header sidebar" "chat output sidebar" "voice voice sidebar"}
.panel{background:var(--panel);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:10px;padding:14px;overflow-y:auto;box-shadow:0 4px 24px rgba(0,212,255,.06)}
.header{grid-area:header;display:flex;align-items:center;justify-content:space-between;padding:12px 18px}
.header h1{font-size:18px;font-weight:600;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;color:transparent;letter-spacing:2px}
.health-strip{display:flex;gap:14px;font-size:11px;color:var(--dim)}
.health-strip span b{color:var(--accent);font-weight:600}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--ok);box-shadow:0 0 8px var(--ok);margin-right:6px}
.dot.off{background:var(--err);box-shadow:0 0 8px var(--err)}
#chat{grid-area:chat}
#output{grid-area:output}
.sidebar{grid-area:sidebar}
.voice{grid-area:voice}
.panel h2{font-size:12px;font-weight:600;color:var(--accent);letter-spacing:1.5px;margin-bottom:10px;text-transform:uppercase}
.msg{padding:8px 10px;margin-bottom:8px;border-radius:6px;line-height:1.5;white-space:pre-wrap;word-wrap:break-word}
.msg.user{background:rgba(0,212,255,.08);border-left:2px solid var(--accent)}
.msg.assistant{background:rgba(124,92,255,.08);border-left:2px solid var(--accent2)}
.msg .who{font-size:10px;color:var(--dim);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px}
.msg .meta{font-size:10px;color:var(--dim);margin-top:6px}
form{display:flex;gap:8px;margin-top:10px}
input[type=text]{flex:1;background:rgba(0,0,0,.3);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-family:inherit;font-size:13px}
input[type=text]:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(0,212,255,.2)}
button{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#000;padding:8px 16px;border-radius:6px;font-family:inherit;font-weight:600;font-size:12px;cursor:pointer;transition:transform .1s}
button:hover{transform:translateY(-1px)}
button:active{transform:translateY(0)}
button.ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
button.danger{background:linear-gradient(135deg,#ef4444,#f59e0b);color:#fff}
.skill{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;border-bottom:1px solid rgba(124,92,255,.1);font-size:11px;cursor:pointer}
.skill:hover{background:rgba(124,92,255,.08)}
.skill code{color:var(--accent);font-family:inherit}
pre{background:rgba(0,0,0,.4);padding:10px;border-radius:6px;overflow-x:auto;font-size:11px;border:1px solid var(--border);margin:6px 0;line-height:1.4}
.tier-chip{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;background:rgba(0,212,255,.15);color:var(--accent);margin-left:6px}
.thinking{color:var(--warn);font-style:italic;font-size:11px}
.msg .body code.inline{background:rgba(0,212,255,.12);color:var(--accent);padding:1px 4px;border-radius:3px;font-size:12px}
.msg .body strong{color:#fff}
.msg .body h3,.msg .body h4{color:var(--accent2);margin:8px 0 4px;font-size:13px}
.msg .body ul{margin:6px 0 6px 20px}
.msg .body li{list-style:disc;margin:2px 0}
.msg .body pre{position:relative}
.msg .body pre::before{content:attr(data-lang);position:absolute;top:4px;right:8px;font-size:9px;color:var(--accent);letter-spacing:1px;opacity:.6;text-transform:uppercase}
.action-chip{display:inline-block;padding:2px 8px;border-radius:10px;background:rgba(124,92,255,.15);border:1px solid var(--accent2);color:var(--accent2);font-style:italic;font-size:11px;margin:2px 4px 2px 0;opacity:.85;animation:pulse 1.5s ease-in-out infinite}
.action-chip.done{opacity:0;transition:all .8s ease-out;max-height:0;margin:0;padding:0;border:none;overflow:hidden;animation:none}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
.action-row{display:flex;flex-wrap:wrap;gap:4px;padding:4px 8px;border-left:2px solid var(--accent2);margin:6px 0}
.action-row.collapsing{opacity:0;transition:all .8s ease-out;max-height:0;padding:0;border:none}
.loading-msg{padding:8px 10px;margin-bottom:8px;border-radius:6px;background:rgba(124,92,255,.05);border-left:2px solid var(--accent2);color:var(--accent2);font-style:italic;font-size:12px;display:flex;align-items:center;gap:8px}
.loading-msg::before{content:'⋯';animation:dots 1s steps(3) infinite;width:18px;display:inline-block;color:var(--accent)}
@keyframes dots{0%{content:'⋯'}33%{content:'·⋯'}66%{content:'··⋯'}}
.loading-msg.fading{opacity:0;max-height:0;padding:0;margin:0;transition:all .5s ease-out;overflow:hidden}
#sessions-list{max-height:140px;overflow-y:auto;border-top:1px solid var(--border);padding-top:8px;margin-top:8px}
.sess{padding:5px 6px;border-radius:4px;cursor:pointer;font-size:11px;color:var(--dim);display:flex;justify-content:space-between;align-items:center}
.sess:hover{background:rgba(0,212,255,.08);color:var(--text)}
.sess.active{background:rgba(0,212,255,.15);color:var(--accent)}
.sess .turns{font-size:9px;background:rgba(124,92,255,.2);padding:1px 4px;border-radius:3px}
#voice-status{font-size:11px;color:var(--dim);margin-top:4px}
.voice-row{display:flex;gap:8px;align-items:center;margin-top:8px}
.persona-pick{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.persona-pick button{padding:3px 8px;font-size:10px}
.persona-pick button.active{box-shadow:0 0 0 2px var(--accent)}
.scroll-bottom{position:sticky;bottom:0;height:0}
</style>
</head>
<body>
<div class="grid">
<header class="header panel">
<h1>◆ ADAM HUD</h1>
<div class="health-strip" id="health">
<span><span class="dot off" id="status-dot"></span><b id="status-label">connecting…</b></span>
<span>lessons <b id="h-lessons">—</b></span>
<span>skills <b id="h-skills">—</b></span>
<span>gpu <b id="h-gpu">—</b></span>
<span>tts <b id="h-tts">—</b></span>
<span>stt <b id="h-stt">—</b></span>
</div>
</header>
<section id="chat" class="panel">
<h2>Chat <span class="tier-chip" id="cur-persona">Rikku</span></h2>
<div id="chat-log"></div>
<div class="scroll-bottom" id="chat-bottom"></div>
<div class="persona-pick" id="persona-pick"></div>
<form id="chat-form"><input type="text" id="chat-input" placeholder="ask Adam anything… (Enter to send)" autocomplete="off"><button type="submit">SEND</button></form>
</section>
<section id="output" class="panel">
<h2>Output / Tools</h2>
<div id="output-log"></div>
</section>
<aside class="sidebar panel">
<h2>Skills (<span id="skills-count">—</span>)</h2>
<div id="skills-list"></div>
<h2 style="margin-top:14px">Sessions</h2>
<div style="display:flex;gap:4px;margin-bottom:6px"><button class="ghost" id="sess-new" style="font-size:10px;padding:3px 8px">+ NEW</button><button class="ghost" id="sess-refresh" style="font-size:10px;padding:3px 8px">↻</button></div>
<div id="sessions-list"></div>
</aside>
<section class="voice panel">
<h2>Voice <select id="voice-pick" style="margin-left:8px;background:rgba(0,0,0,.3);color:var(--text);border:1px solid var(--border);padding:3px 8px;border-radius:4px;font-family:inherit;font-size:11px"><option value="">auto</option></select></h2>
<div class="voice-row">
<button id="voice-rec">● RECORD 5s</button>
<button id="voice-rec-long" class="ghost">● 10s</button>
<button id="voice-replay" class="ghost">▶ Last reply</button>
<button id="voice-test" class="ghost">Test TTS</button>
</div>
<div id="voice-status">Mic ready. Click RECORD to talk.</div>
</section>
</div>
<script>
const API='http://127.0.0.1:11434';
let session='hud_'+Math.random().toString(36).slice(2,10);
let lastReplyAudio=null;
let curPersona='Rikku';
async function refreshHealth(){
  try{
    const r=await fetch(`${API}/health`);
    const d=await r.json();
    document.getElementById('status-dot').classList.remove('off');
    document.getElementById('status-label').textContent='OK '+d.version;
    document.getElementById('h-lessons').textContent=d.adam?.lessons_n||'—';
    document.getElementById('h-skills').textContent=d.skills?.count||'—';
    document.getElementById('h-gpu').textContent=d.gpu?.device_name?d.gpu.device_name.replace('AMD Radeon ',''):(d.gpu?.cuda_or_rocm?'yes':'cpu');
    document.getElementById('h-tts').textContent=d.voice?.tts_backend||'none';
    document.getElementById('h-stt').textContent=d.voice?.stt_backend||'none';
    if(d.skills?.names)renderSkills(d.skills.names);
    if(d.personas_known)renderPersonas(d.personas_known);
  }catch(e){
    document.getElementById('status-dot').classList.add('off');
    document.getElementById('status-label').textContent='offline';
  }
}
function renderSkills(names){
  document.getElementById('skills-count').textContent=names.length;
  const wrap=document.getElementById('skills-list');wrap.innerHTML='';
  names.forEach(n=>{
    const el=document.createElement('div');el.className='skill';
    el.innerHTML=`<code>${n}</code><span style="color:var(--dim);font-size:10px">try →</span>`;
    el.onclick=()=>document.getElementById('chat-input').focus()&&(document.getElementById('chat-input').value=`use ${n}: `);
    wrap.appendChild(el);
  });
}
function renderPersonas(list){
  const wrap=document.getElementById('persona-pick');wrap.innerHTML='';
  list.slice(0,8).forEach(n=>{
    const b=document.createElement('button');b.textContent=n;b.className='ghost'+(n===curPersona?' active':'');
    b.onclick=async()=>{
      await fetch(`${API}/persona`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n})});
      curPersona=n;document.getElementById('cur-persona').textContent=n;
      renderPersonas(list);
    };
    wrap.appendChild(b);
  });
}
function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function renderMarkdown(text){
  if(!text)return '';
  let out=escapeHtml(text);
  out=out.replace(/```(\w*)\n([\s\S]*?)```/g,(_,lang,code)=>`<pre data-lang="${lang||'text'}"><code>${code}</code></pre>`);
  out=out.replace(/`([^`\n]+)`/g,'<code class="inline">$1</code>');
  out=out.replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>');
  out=out.replace(/(^|\n)#### ([^\n]+)/g,'$1<h4>$2</h4>');
  out=out.replace(/(^|\n)### ([^\n]+)/g,'$1<h3>$2</h3>');
  out=out.replace(/(^|\n)## ([^\n]+)/g,'$1<h2 style="font-size:14px;margin:8px 0 4px">$2</h2>');
  out=out.replace(/(^|\n)- ([^\n]+)/g,'$1<li>$2</li>');
  out=out.replace(/(<li>[^<]+<\/li>\n?)+/g,m=>'<ul>'+m+'</ul>');
  out=out.replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" style="color:var(--accent)">$1</a>');
  out=out.replace(/\n{2,}/g,'<br><br>').replace(/\n/g,'<br>');
  return out;
}
function addMsg(role,text,meta){
  const log=document.getElementById('chat-log');
  const m=document.createElement('div');m.className='msg '+role;
  m.innerHTML=`<div class="who">${role==='user'?'you':curPersona}</div><div class="body"></div>`+(meta?`<div class="meta">${meta}</div>`:'');
  const body=m.querySelector('.body');
  body._raw='';
  body.update=(t)=>{body._raw=t;body.innerHTML=renderMarkdown(t);};
  body.update(text||'');
  log.appendChild(m);
  document.getElementById('chat-bottom').scrollIntoView({behavior:'smooth'});
  return body;
}
function addOutput(label,content){
  const log=document.getElementById('output-log');
  const m=document.createElement('div');
  m.innerHTML=`<div style="color:var(--dim);font-size:10px;margin-top:8px">${label}</div>`;
  const pre=document.createElement('pre');pre.textContent=typeof content==='string'?content:JSON.stringify(content,null,2);
  m.appendChild(pre);log.appendChild(m);log.scrollTop=log.scrollHeight;
}
document.getElementById('chat-form').onsubmit=async(e)=>{
  e.preventDefault();
  const input=document.getElementById('chat-input');const text=input.value.trim();if(!text)return;
  input.value='';addMsg('user',text);
  const body=addMsg('assistant','');body.innerHTML='<span class="thinking">thinking…</span>';
  try{
    const r=await fetch(`${API}/chat/stream`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,session_id:session})});
    const reader=r.body.getReader();const dec=new TextDecoder();let buf='',acc='',ev='token';
    body.textContent='';
    while(true){
      const {done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});
      let i;
      while((i=buf.indexOf('\n\n'))>=0){
        const chunk=buf.slice(0,i);buf=buf.slice(i+2);
        for(const ln of chunk.split('\n')){
          if(ln.startsWith('event:'))ev=ln.slice(6).trim();
          else if(ln.startsWith('data:')){
            const d=ln.slice(5).trim();
            if(ev==='token'){try{acc+=JSON.parse(d);body.update(acc);}catch{}}
            else if(ev==='meta'){try{const m=JSON.parse(d);if(m.skill)addOutput('SKILL: '+m.skill,m);}catch{}}
            else if(ev==='done'){try{const m=JSON.parse(d);body.parentElement.querySelector('.meta')||body.parentElement.insertAdjacentHTML('beforeend',`<div class="meta">tier=${m.tier} wall=${m.wall_s}s</div>`);}catch{}}
            else if(ev==='web_lookup'){
              try{
                const wobj=JSON.parse(d);
                if(!window._curLoading){
                  window._curLoading=document.createElement('div');window._curLoading.className='loading-msg';
                  document.getElementById('chat-log').appendChild(window._curLoading);
                }
                window._curLoading.lastChild?.remove&&(window._curLoading.lastChild.nodeType===3?window._curLoading.removeChild(window._curLoading.lastChild):null);
                const txt=document.createTextNode(`searching the web for: ${wobj.query||''}`);
                if(window._curLoading.childNodes.length>1)window._curLoading.replaceChild(txt,window._curLoading.childNodes[window._curLoading.childNodes.length-1]);
                else window._curLoading.appendChild(txt);
              }catch{}
            } else if(ev==='web_supplement_done'){
              if(window._curLoading){window._curLoading.classList.add('fading');setTimeout(()=>{try{window._curLoading.remove();window._curLoading=null;}catch{}},500);}
            } else if(ev==='thinking'){
              try{
                const tobj=JSON.parse(d);
                if(!window._curLoading){
                  window._curLoading=document.createElement('div');window._curLoading.className='loading-msg';
                  document.getElementById('chat-log').appendChild(window._curLoading);
                }
                while(window._curLoading.childNodes.length>0)window._curLoading.removeChild(window._curLoading.lastChild);
                window._curLoading.appendChild(document.createTextNode(`thinking… ${tobj.elapsed||0}s · ${tobj.buf_chars||0} chars`));
              }catch{}
            } else if(ev==='token'){
              if(window._curLoading){window._curLoading.classList.add('fading');setTimeout(()=>{try{window._curLoading.remove();window._curLoading=null;}catch{}},500);}
            } else if(ev.startsWith('agentic_')){
              try{
                const aobj=JSON.parse(d);
                let row=document.getElementById('cur-action-row');
                if(!row && (ev==='agentic_step_start'||ev==='agentic_workspace_context'||ev==='agentic_plan_start')){
                  row=document.createElement('div');row.className='action-row';row.id='cur-action-row';
                  document.getElementById('chat-log').appendChild(row);
                }
                if(ev==='agentic_workspace_context' && row){
                  const c=document.createElement('span');c.className='action-chip';
                  const s=aobj.summary||{};c.textContent=`workspace · ${s.git_branch||'-'} · ${(s.languages||[]).slice(0,2).join('/')||'?'} · ${s.dirty_files||0} dirty`;
                  row.appendChild(c);
                } else if(ev==='agentic_step_start' && row){
                  const c=document.createElement('span');c.className='action-chip';c.dataset.step=aobj.step;
                  const argkeys=Object.keys(aobj.args||{}).slice(0,3).map(k=>{const v=aobj.args[k];return typeof v==='string'?`${k}=${v.slice(0,20)}`:k}).join(', ');
                  c.textContent=`${aobj.tool}(${argkeys})`;
                  row.appendChild(c);
                } else if(ev==='agentic_step_result' && row){
                  const c=row.querySelector(`[data-step="${aobj.step}"]`);
                  if(c){c.textContent=`${c.textContent} ${aobj.ok?'✓':'✗'}`;c.classList.add('done');setTimeout(()=>{try{c.remove();}catch{}},900);}
                } else if((ev==='agentic_final'||ev==='agentic_auto_final') && row){
                  row.classList.add('collapsing');
                  row.id='';
                  setTimeout(()=>{try{row.remove();}catch{}},900);
                }
              }catch{}
            }
          }
        }
      }
    }
  }catch(e){body.innerHTML=`<span style="color:var(--err)">${e.message}</span>`;}
};
async function recordAndSend(sec){
  if(!navigator.mediaDevices){document.getElementById('voice-status').textContent='no mediaDevices';return;}
  const stream=await navigator.mediaDevices.getUserMedia({audio:true});
  document.getElementById('voice-status').textContent=`recording ${sec}s…`;
  const rec=new MediaRecorder(stream,{mimeType:'audio/webm'});const chunks=[];
  rec.ondataavailable=(e)=>chunks.push(e.data);
  rec.onstop=async()=>{
    stream.getTracks().forEach(t=>t.stop());
    document.getElementById('voice-status').textContent='processing…';
    const blob=new Blob(chunks,{type:'audio/webm'});
    const buf=await blob.arrayBuffer();
    const b64=btoa(String.fromCharCode(...new Uint8Array(buf)));
    try{
      const r=await fetch(`${API}/voice/chat`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({audio_base64:b64,session_id:session,return_audio:true})});
      const d=await r.json();
      if(d.transcript)addMsg('user',d.transcript,'(transcribed)');
      if(d.response)addMsg('assistant',d.spoken_text||d.response,`tier=${d.tier} wall=${d.wall_s}s`);
      if(d.audio_base64){lastReplyAudio=d.audio_base64;playB64(d.audio_base64);}
      document.getElementById('voice-status').textContent='ready';
    }catch(e){document.getElementById('voice-status').textContent='error: '+e.message;}
  };
  rec.start();setTimeout(()=>rec.stop(),sec*1000);
}
function playB64(b64){
  const bin=atob(b64);const arr=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
  const blob=new Blob([arr],{type:'audio/wav'});const url=URL.createObjectURL(blob);const a=new Audio(url);a.play();
}
document.getElementById('voice-rec').onclick=()=>recordAndSend(5);
document.getElementById('voice-rec-long').onclick=()=>recordAndSend(10);
document.getElementById('voice-replay').onclick=()=>{if(lastReplyAudio)playB64(lastReplyAudio);};
function getSelectedVoice(){return document.getElementById('voice-pick').value||undefined;}
document.getElementById('voice-test').onclick=async()=>{
  const args={text:'Hello Anthony. I am your new neural voice from Piper. I sound much more natural now.'};
  const v=getSelectedVoice();if(v)args.voice=v;
  const r=await fetch(`${API}/skills/tts`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({args})});
  const d=await r.json();if(d.output?.audio_base64)playB64(d.output.audio_base64);
};
async function loadVoices(){
  try{
    const r=await fetch(`${API}/skills/tts`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({args:{text:'x',list_voices:true}})});
    const d=await r.json();const voices=d.output?.voices||[];
    const sel=document.getElementById('voice-pick');
    while(sel.options.length>1)sel.remove(1);
    voices.filter(v=>v.backend==='piper').forEach(v=>{
      const opt=document.createElement('option');opt.value=v.alias||v.name;
      opt.textContent=`${v.alias||v.name} · ${v.label||''}`;
      sel.appendChild(opt);
    });
  }catch(e){}
}
loadVoices();
async function refreshSessions(){
  try{
    const r=await fetch(`${API}/sessions`);const d=await r.json();
    const wrap=document.getElementById('sessions-list');wrap.innerHTML='';
    (d.sessions||[]).slice(0,12).forEach(s=>{
      const el=document.createElement('div');el.className='sess'+(s.session_id===session?' active':'');
      const label=(s.session_id||'').slice(0,16);const turns=s.turns_n??s.turns??'?';
      el.innerHTML=`<span>${label}</span><span class="turns">${turns}t</span>`;
      el.onclick=async()=>{await loadSession(s.session_id);};
      wrap.appendChild(el);
    });
  }catch(e){}
}
async function loadSession(sid){
  try{
    const r=await fetch(`${API}/sessions/${sid}`);const d=await r.json();
    session=sid;document.getElementById('chat-log').innerHTML='';
    (d.turns||[]).forEach(t=>{
      if(t.role==='user')addMsg('user',t.content||'');
      else if(t.role==='assistant')addMsg('assistant',t.content||'',t.tier?`tier=${t.tier}`:'');
    });
    refreshSessions();
  }catch(e){console.error(e);}
}
document.getElementById('sess-new').onclick=()=>{
  session='hud_'+Math.random().toString(36).slice(2,10);
  document.getElementById('chat-log').innerHTML='';refreshSessions();
};
document.getElementById('sess-refresh').onclick=refreshSessions;
refreshHealth();refreshSessions();setInterval(refreshHealth,10000);setInterval(refreshSessions,30000);
</script>
</body>
</html>
