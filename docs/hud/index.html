<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Adam</title>
<style>
:root{
  --bg-0:#06070d;--bg-1:#0c0e1a;--bg-2:#141728;
  --panel:rgba(20,24,40,.55);--panel-strong:rgba(28,32,52,.85);
  --accent:#00d4ff;--accent2:#8b5cf6;--accent3:#ec4899;
  --ok:#10b981;--warn:#f59e0b;--err:#ef4444;
  --text:#e2e8f0;--text-dim:#94a3b8;--text-faint:#64748b;
  --border:rgba(139,92,246,.18);--border-hover:rgba(0,212,255,.4);
  --code-bg:#0a0c18;
  --shadow-soft:0 4px 24px rgba(0,212,255,.04);
  --shadow-hover:0 6px 32px rgba(0,212,255,.12);
  --font-ui:'Inter','SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --font-mono:'JetBrains Mono','SF Mono','Cascadia Code',Consolas,Monaco,monospace;
}
@import url('https://rsms.me/inter/inter.css');
*{box-sizing:border-box;margin:0;padding:0}
*::-webkit-scrollbar{width:8px;height:8px}
*::-webkit-scrollbar-track{background:transparent}
*::-webkit-scrollbar-thumb{background:rgba(139,92,246,.2);border-radius:4px}
*::-webkit-scrollbar-thumb:hover{background:rgba(139,92,246,.4)}
body{
  font-family:var(--font-ui);
  background:var(--bg-0);
  color:var(--text);
  min-height:100vh;
  padding:16px;
  font-size:14px;
  overflow:hidden;
  position:relative;
}
body::before{
  content:'';position:fixed;inset:0;z-index:-1;
  background:
    radial-gradient(ellipse 80% 60% at 20% 0%,rgba(139,92,246,.12) 0%,transparent 50%),
    radial-gradient(ellipse 60% 80% at 100% 100%,rgba(0,212,255,.08) 0%,transparent 50%),
    radial-gradient(ellipse 40% 40% at 50% 50%,rgba(236,72,153,.05) 0%,transparent 60%);
  animation:drift 30s ease-in-out infinite;
}
@keyframes drift{
  0%,100%{transform:translate(0,0) scale(1)}
  50%{transform:translate(-2%,-1%) scale(1.05)}
}
.grid{
  display:grid;
  grid-template-columns:1fr 380px;
  grid-template-rows:auto 1fr;
  gap:14px;
  height:calc(100vh - 32px);
  grid-template-areas:"header sidebar" "chat sidebar";
  max-width:1800px;
  margin:0 auto;
}
.panel{
  background:var(--panel);
  backdrop-filter:blur(24px) saturate(160%);
  -webkit-backdrop-filter:blur(24px) saturate(160%);
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px 18px;
  overflow:hidden;
  box-shadow:var(--shadow-soft);
  display:flex;flex-direction:column;
  transition:border-color .3s;
}
.panel:hover{border-color:rgba(139,92,246,.28)}
.panel-scroll{overflow-y:auto;flex:1;min-height:0}
.header{
  grid-area:header;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 24px;
  flex-direction:row;
}
.brand{display:flex;align-items:center;gap:14px}
.brand-logo{
  width:36px;height:36px;border-radius:9px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-weight:700;color:#000;font-size:18px;
  box-shadow:0 4px 20px rgba(0,212,255,.4);
}
.brand h1{
  font-size:17px;
  font-weight:600;
  letter-spacing:.5px;
  background:linear-gradient(90deg,var(--text) 0%,var(--accent) 100%);
  -webkit-background-clip:text;color:transparent;
}
.brand .tagline{font-size:11px;color:var(--text-faint);font-weight:400;letter-spacing:1px;margin-top:2px;text-transform:uppercase}
.health-strip{display:flex;gap:18px;font-size:12px;color:var(--text-dim);align-items:center}
.health-strip .stat{display:flex;flex-direction:column;align-items:flex-end}
.health-strip .stat .lbl{font-size:9px;color:var(--text-faint);text-transform:uppercase;letter-spacing:1px}
.health-strip .stat b{color:var(--text);font-weight:600;font-variant-numeric:tabular-nums}
.status-pill{
  display:flex;align-items:center;gap:7px;
  background:rgba(16,185,129,.1);
  border:1px solid rgba(16,185,129,.3);
  padding:6px 12px;border-radius:20px;
  font-size:11px;font-weight:500;
}
.status-pill.off{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--ok);box-shadow:0 0 12px var(--ok);animation:pulse-dot 2s ease-in-out infinite}
.dot.off{background:var(--err);box-shadow:0 0 12px var(--err);animation:none}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 12px var(--ok)}50%{box-shadow:0 0 20px var(--ok)}}
#chat{grid-area:chat}
.sidebar{grid-area:sidebar;display:flex;flex-direction:column;gap:14px;overflow:hidden;padding:0;background:transparent;border:none;box-shadow:none}
.sidebar > .panel{padding:14px 16px}
.section-title{font-size:10px;font-weight:600;color:var(--text-faint);letter-spacing:2px;margin-bottom:10px;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between}
.section-title .count{background:rgba(0,212,255,.1);color:var(--accent);padding:2px 7px;border-radius:8px;font-size:10px;letter-spacing:0}
.persona-bar{display:flex;align-items:center;gap:10px;padding-bottom:12px;margin-bottom:12px;border-bottom:1px solid var(--border)}
.persona-avatar{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent2),var(--accent3));
  display:flex;align-items:center;justify-content:center;
  font-weight:600;color:#fff;font-size:14px;
  flex-shrink:0;
}
.persona-info{flex:1;min-width:0}
.persona-name{font-weight:600;font-size:13px;color:var(--text)}
.persona-voice{font-size:10px;color:var(--text-faint);margin-top:2px}
.persona-pick{display:flex;gap:5px;flex-wrap:wrap}
.persona-pick button{padding:4px 10px;font-size:10px;border-radius:14px}
.persona-pick button.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;border:none}
.chat-log{flex:1;overflow-y:auto;padding-right:6px;display:flex;flex-direction:column;gap:8px;scroll-behavior:smooth}
.msg{
  padding:12px 14px;
  border-radius:12px;
  line-height:1.55;
  word-wrap:break-word;
  position:relative;
  animation:msg-in .3s ease-out;
  display:flex;flex-direction:column;gap:6px;
}
@keyframes msg-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.user{background:linear-gradient(135deg,rgba(0,212,255,.06),rgba(0,212,255,.02));border:1px solid rgba(0,212,255,.15);align-self:flex-end;max-width:85%}
.msg.assistant{background:linear-gradient(135deg,rgba(139,92,246,.05),rgba(139,92,246,.02));border:1px solid rgba(139,92,246,.15);max-width:95%}
.msg .who{font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:1.5px;font-weight:600;display:flex;align-items:center;gap:6px}
.msg .who::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor}
.msg.user .who{color:var(--accent)}
.msg.assistant .who{color:var(--accent2)}
.msg .body{font-size:14px;line-height:1.6}
.msg .body p{margin:.4em 0}
.msg .body code.inline{background:rgba(0,212,255,.1);color:var(--accent);padding:2px 6px;border-radius:4px;font-size:12.5px;font-family:var(--font-mono);font-weight:500}
.msg .body strong{color:#fff;font-weight:600}
.msg .body em{color:var(--text-dim)}
.msg .body h2,.msg .body h3,.msg .body h4{color:var(--accent2);margin:12px 0 6px;font-weight:600;font-size:14px}
.msg .body ul,.msg .body ol{margin:6px 0 6px 22px;padding:0}
.msg .body li{margin:3px 0;line-height:1.5}
.msg .body blockquote{border-left:3px solid var(--accent2);padding:4px 12px;margin:8px 0;color:var(--text-dim);font-style:italic;background:rgba(139,92,246,.04);border-radius:0 6px 6px 0}
.msg .body table{border-collapse:collapse;margin:8px 0;font-size:13px;background:rgba(0,0,0,.2);border-radius:6px;overflow:hidden}
.msg .body th,.msg .body td{padding:6px 10px;border:1px solid var(--border);text-align:left}
.msg .body th{background:rgba(139,92,246,.15);color:var(--text);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:1px}
.msg .body a{color:var(--accent);text-decoration:none;border-bottom:1px dashed rgba(0,212,255,.4)}
.msg .body a:hover{border-bottom-style:solid}
.msg .body pre{
  background:var(--code-bg);
  padding:12px 14px;
  padding-top:28px;
  border-radius:8px;
  overflow-x:auto;
  font-size:12.5px;
  border:1px solid var(--border);
  margin:8px 0;
  line-height:1.5;
  position:relative;
  font-family:var(--font-mono);
}
.msg .body pre::before{
  content:attr(data-lang);
  position:absolute;top:6px;left:12px;
  font-size:10px;color:var(--accent2);letter-spacing:1px;opacity:.8;
  text-transform:uppercase;font-weight:600;
}
.msg .body pre code{font-family:var(--font-mono);color:#cbd5e1}
.msg .body pre .copy-btn{
  position:absolute;top:5px;right:8px;
  background:rgba(139,92,246,.15);border:1px solid var(--border);
  color:var(--text-dim);padding:2px 8px;border-radius:4px;
  font-size:10px;cursor:pointer;font-family:var(--font-ui);
  opacity:0;transition:opacity .2s;
  user-select:none;-webkit-user-select:none;
}
.msg .body pre:hover .copy-btn{opacity:1}
.msg .body pre .copy-btn:hover{background:rgba(0,212,255,.2);color:var(--accent)}
.msg .body pre .copy-btn.copied{color:var(--ok);border-color:var(--ok)}
.msg .meta{font-size:10px;color:var(--text-faint);margin-top:8px;display:flex;gap:10px;align-items:center}
.msg .meta::before{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);max-width:30px}
.tier-chip{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;background:rgba(0,212,255,.1);color:var(--accent);font-variant-numeric:tabular-nums}
.cursor::after{content:'▎';color:var(--accent);animation:blink 1s steps(2) infinite;margin-left:2px;font-weight:700}
@keyframes blink{50%{opacity:0}}
.loading-msg{
  padding:10px 14px;margin:4px 0;border-radius:10px;
  background:linear-gradient(135deg,rgba(139,92,246,.08),rgba(0,212,255,.04));
  border:1px solid rgba(139,92,246,.2);
  color:var(--accent2);font-style:italic;font-size:12px;
  display:flex;align-items:center;gap:10px;animation:msg-in .3s ease-out;
}
.loading-msg::before{
  content:'';width:8px;height:8px;border-radius:50%;
  background:var(--accent2);
  animation:bounce-dot 1.2s ease-in-out infinite;
  box-shadow:0 0 8px var(--accent2);
}
@keyframes bounce-dot{0%,100%{transform:translateY(0);opacity:.6}50%{transform:translateY(-4px);opacity:1}}
.loading-msg.fading{opacity:0;max-height:0;padding-top:0;padding-bottom:0;margin:0;transition:all .4s ease-out;overflow:hidden;border-width:0}
.action-row{
  display:flex;flex-wrap:wrap;gap:5px;padding:6px 12px;
  background:rgba(139,92,246,.04);border-radius:8px;
  margin:4px 0;animation:msg-in .3s ease-out;
}
.action-row.collapsing{opacity:0;max-height:0;padding:0;margin:0;transition:all .5s ease-out;overflow:hidden}
.action-chip{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 9px;border-radius:12px;
  background:rgba(139,92,246,.12);
  border:1px solid rgba(139,92,246,.3);
  color:var(--accent2);font-style:italic;font-size:11px;
  font-family:var(--font-mono);
  opacity:.9;animation:pulse-chip 1.5s ease-in-out infinite;
}
.action-chip.done{opacity:0;max-width:0;padding:0;margin:0;border:none;overflow:hidden;transition:all .4s ease-out;animation:none}
@keyframes pulse-chip{0%,100%{opacity:.7;border-color:rgba(139,92,246,.3)}50%{opacity:1;border-color:rgba(139,92,246,.6)}}
.compose{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
input[type=text]{
  flex:1;background:rgba(0,0,0,.3);
  border:1px solid var(--border);color:var(--text);
  padding:10px 14px;border-radius:10px;
  font-family:var(--font-ui);font-size:13px;transition:all .2s;
}
input[type=text]:focus{outline:none;border-color:var(--border-hover);box-shadow:0 0 0 3px rgba(0,212,255,.1);background:rgba(0,0,0,.5)}
button{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;color:#000;
  padding:10px 18px;border-radius:10px;
  font-family:var(--font-ui);font-weight:600;font-size:12px;
  cursor:pointer;transition:all .15s;
  letter-spacing:.3px;
}
button:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(0,212,255,.3)}
button:active{transform:translateY(0)}
button.ghost{background:transparent;border:1px solid var(--border);color:var(--text);font-weight:500}
button.ghost:hover{border-color:var(--border-hover);background:rgba(0,212,255,.05);box-shadow:none}
button.icon{padding:8px 10px;font-size:14px}
select{
  background:rgba(0,0,0,.3);border:1px solid var(--border);
  color:var(--text);padding:5px 10px;border-radius:6px;
  font-family:var(--font-ui);font-size:11px;
  cursor:pointer;transition:all .2s;
}
select:hover{border-color:var(--border-hover)}
.skill-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 8px;border-radius:6px;
  font-size:11px;cursor:pointer;
  transition:all .15s;
  font-family:var(--font-mono);
}
.skill-row:hover{background:rgba(0,212,255,.05);color:var(--text)}
.skill-row code{color:var(--accent);font-family:inherit;font-weight:500}
.skill-row .hint{color:var(--text-faint);font-size:9px}
#sessions-list{max-height:200px;overflow-y:auto}
.sess{
  padding:8px 10px;border-radius:7px;cursor:pointer;
  font-size:12px;color:var(--text-dim);
  display:flex;flex-direction:column;gap:2px;
  margin-bottom:3px;transition:all .15s;border:1px solid transparent;
}
.sess:hover{background:rgba(0,212,255,.05);color:var(--text);border-color:var(--border)}
.sess.active{background:rgba(0,212,255,.1);color:var(--accent);border-color:var(--border-hover)}
.sess-head{display:flex;justify-content:space-between;align-items:center;gap:8px}
.sess-id{font-family:var(--font-mono);font-size:10px;opacity:.6}
.sess-time{font-size:9px;color:var(--text-faint);font-variant-numeric:tabular-nums}
.sess-preview{font-size:11px;color:var(--text-faint);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.voice-controls{display:flex;flex-direction:column;gap:8px}
.voice-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.voice-row button{padding:6px 12px;font-size:11px}
#voice-status{font-size:10px;color:var(--text-faint);margin-top:4px;font-family:var(--font-mono)}
.voice-status.recording{color:var(--err);animation:pulse-chip 1s ease-in-out infinite}
.toast{
  position:fixed;bottom:20px;right:20px;
  padding:10px 16px;background:var(--panel-strong);
  backdrop-filter:blur(20px);border:1px solid var(--border);
  border-radius:10px;font-size:12px;color:var(--text);
  box-shadow:0 8px 32px rgba(0,0,0,.3);
  animation:toast-in .3s ease-out;z-index:1000;
}
@keyframes toast-in{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.toast.fade-out{animation:toast-out .3s ease-out forwards}
@keyframes toast-out{to{transform:translateY(20px);opacity:0}}
.toast.ok{border-color:rgba(16,185,129,.4)}
.toast.err{border-color:rgba(239,68,68,.4);color:#fca5a5}
.empty-state{padding:40px 20px;text-align:center;color:var(--text-faint);font-size:12px}
.empty-state .emoji{font-size:32px;margin-bottom:8px;display:block;opacity:.4}
.scroll-bottom{height:0;flex-shrink:0}
@media (max-width:1100px){
  .grid{grid-template-columns:1fr;grid-template-areas:"header" "chat" "sidebar";grid-template-rows:auto 1fr auto;height:auto;min-height:calc(100vh - 32px)}
  .sidebar{flex-direction:row;overflow-x:auto}
  .sidebar > .panel{min-width:260px}
}
</style>
</head>
<body>
<div class="grid">
  <header class="header panel">
    <div class="brand">
      <div class="brand-logo">A</div>
      <div>
        <h1>ADAM</h1>
        <div class="tagline">local-first AI</div>
      </div>
    </div>
    <div class="health-strip" id="health">
      <div class="status-pill off"><span class="dot off" id="status-dot"></span><span id="status-label">connecting…</span></div>
      <div class="stat"><span class="lbl">lessons</span><b id="h-lessons">—</b></div>
      <div class="stat"><span class="lbl">skills</span><b id="h-skills">—</b></div>
      <div class="stat"><span class="lbl">tts</span><b id="h-tts">—</b></div>
      <div class="stat"><span class="lbl">gpu</span><b id="h-gpu" style="font-size:11px">—</b></div>
    </div>
  </header>

  <section id="chat" class="panel">
    <div class="persona-bar">
      <div class="persona-avatar" id="persona-avatar">R</div>
      <div class="persona-info">
        <div class="persona-name" id="cur-persona-name">Rikku</div>
        <div class="persona-voice">voice: <span id="cur-voice">auto</span></div>
      </div>
      <select id="persona-select" title="Switch persona"></select>
    </div>
    <div class="chat-log panel-scroll" id="chat-log">
      <div class="empty-state" id="empty-state">
        <span class="emoji">◆</span>
        Start a conversation with Adam.<br>
        <small>Ask questions, build code, or chat by voice.</small>
      </div>
    </div>
    <div class="scroll-bottom" id="chat-bottom"></div>
    <form class="compose" id="chat-form">
      <input type="text" id="chat-input" placeholder="Message Adam…  (Enter to send)" autocomplete="off">
      <button type="submit">Send</button>
    </form>
  </section>

  <aside class="sidebar">
    <section class="panel">
      <div class="section-title">Voice
        <select id="voice-pick" style="font-size:10px"><option value="">auto (persona)</option></select>
      </div>
      <div class="voice-controls">
        <div class="voice-row">
          <button id="voice-rec">● Record 5s</button>
          <button id="voice-rec-long" class="ghost">10s</button>
          <button id="voice-test" class="ghost">Test</button>
          <button id="voice-replay" class="ghost icon">▶</button>
        </div>
        <label style="display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-dim);cursor:pointer;margin-top:4px;padding:4px 0">
          <input type="checkbox" id="speak-toggle" style="width:14px;height:14px;cursor:pointer;accent-color:var(--accent)">
          <span>🔊 Speak all replies aloud</span>
        </label>
        <div id="voice-status">Ready</div>
      </div>
    </section>

    <section class="panel">
      <div class="section-title">Sessions
        <span>
          <button class="ghost icon" id="sess-new" title="New session" style="padding:3px 8px;font-size:10px">+ new</button>
        </span>
      </div>
      <div id="sessions-list">
        <div class="empty-state" style="padding:20px 10px;font-size:11px">
          <span class="emoji" style="font-size:20px">◌</span>
          No sessions yet
        </div>
      </div>
    </section>

    <section class="panel" style="flex:1;overflow:hidden">
      <div class="section-title">Skills <span class="count" id="skills-count">—</span></div>
      <div id="skills-list" class="panel-scroll" style="flex:1"></div>
    </section>
  </aside>
</div>

<script>
const API='http://127.0.0.1:11434';
let session='hud_'+Math.random().toString(36).slice(2,10);
let lastReplyAudio=null;
let curPersona='Rikku';
let curVoice='auto';

function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function highlightCode(code,lang){
  let h=escapeHtml(code);
  if(['py','python'].includes((lang||'').toLowerCase())){
    h=h.replace(/\b(def|class|return|if|elif|else|for|while|try|except|finally|import|from|as|with|in|not|and|or|is|None|True|False|self|cls|lambda|yield|raise|pass|break|continue|global|nonlocal|async|await)\b/g,'<span style="color:#c084fc">$1</span>');
    h=h.replace(/(#[^\n]*)/g,'<span style="color:#64748b;font-style:italic">$1</span>');
    h=h.replace(/(&#39;[^&]*&#39;|&quot;[^&]*&quot;)/g,'<span style="color:#86efac">$1</span>');
    h=h.replace(/\b(\d+\.?\d*)\b/g,'<span style="color:#fbbf24">$1</span>');
  }
  if(['rs','rust'].includes((lang||'').toLowerCase())){
    h=h.replace(/\b(fn|let|mut|const|pub|use|mod|struct|enum|trait|impl|for|while|loop|if|else|match|return|break|continue|self|Self|where|as|in|ref|move|async|await|dyn|crate)\b/g,'<span style="color:#c084fc">$1</span>');
    h=h.replace(/(\/\/[^\n]*)/g,'<span style="color:#64748b;font-style:italic">$1</span>');
    h=h.replace(/(&quot;[^&]*&quot;)/g,'<span style="color:#86efac">$1</span>');
  }
  if(['js','javascript','ts','typescript'].includes((lang||'').toLowerCase())){
    h=h.replace(/\b(function|const|let|var|class|extends|return|if|else|for|while|do|switch|case|break|continue|new|this|null|undefined|true|false|async|await|import|export|from|of|in|typeof|instanceof)\b/g,'<span style="color:#c084fc">$1</span>');
    h=h.replace(/(\/\/[^\n]*)/g,'<span style="color:#64748b;font-style:italic">$1</span>');
    h=h.replace(/(&#39;[^&]*&#39;|&quot;[^&]*&quot;|`[^`]*`)/g,'<span style="color:#86efac">$1</span>');
  }
  return h;
}

function renderMarkdown(text){
  if(!text)return '';
  const codes=[];
  let out=text.replace(/```(\w*)\n([\s\S]*?)```/g,(_,lang,code)=>{
    const i=codes.length;
    codes.push({lang:lang||'text',code});
    return `[[CODE${i}]]`;
  });
  out=escapeHtml(out);
  out=out.replace(/`([^`\n]+)`/g,'<code class="inline">$1</code>');
  out=out.replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>');
  out=out.replace(/(?<!\*)\*([^*\n]+)\*(?!\*)/g,'<em>$1</em>');
  out=out.replace(/(^|\n)#### ([^\n]+)/g,'$1<h4>$2</h4>');
  out=out.replace(/(^|\n)### ([^\n]+)/g,'$1<h3>$2</h3>');
  out=out.replace(/(^|\n)## ([^\n]+)/g,'$1<h2>$2</h2>');
  out=out.replace(/(^|\n)&gt; ([^\n]+)/g,'$1<blockquote>$2</blockquote>');
  out=out.replace(/(^|\n)- ([^\n]+)/g,'$1<li>$2</li>');
  out=out.replace(/(<li>[^<]+<\/li>\n?)+/g,m=>'<ul>'+m+'</ul>');
  out=out.replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');
  out=out.replace(/\n{2,}/g,'</p><p>').replace(/\n/g,'<br>');
  out='<p>'+out+'</p>';
  out=out.replace(/\[\[CODE(\d+)\]\]/g,(_,i)=>{
    const c=codes[parseInt(i)];
    return `<pre data-lang="${c.lang}"><button class="copy-btn">⧉ copy</button><code>${highlightCode(c.code,c.lang)}</code></pre>`;
  });
  return out;
}

function attachCopyButtons(root){
  root.querySelectorAll('.copy-btn').forEach(btn=>{
    btn.onclick=(e)=>{
      e.preventDefault();
      const code=btn.parentElement.querySelector('code').textContent;
      navigator.clipboard.writeText(code).then(()=>{
        btn.textContent='copied';btn.classList.add('copied');
        setTimeout(()=>{btn.textContent='copy';btn.classList.remove('copied');},1500);
      });
    };
  });
}

function relTime(ts){
  if(!ts)return '';
  const dt=(Date.now()/1000)-ts;
  if(dt<60)return 'now';
  if(dt<3600)return Math.floor(dt/60)+'m';
  if(dt<86400)return Math.floor(dt/3600)+'h';
  if(dt<604800)return Math.floor(dt/86400)+'d';
  return Math.floor(dt/604800)+'w';
}

function personaInitial(name){return (name||'?').slice(0,1).toUpperCase();}

function toast(text,kind='ok',ttl=2500){
  const t=document.createElement('div');t.className='toast '+kind;t.textContent=text;
  document.body.appendChild(t);
  setTimeout(()=>{t.classList.add('fade-out');setTimeout(()=>t.remove(),300);},ttl);
}

async function refreshHealth(){
  try{
    const r=await fetch(`${API}/health`);
    const d=await r.json();
    document.getElementById('status-dot').classList.remove('off');
    document.querySelector('.status-pill').classList.remove('off');
    document.getElementById('status-label').textContent=d.version;
    document.getElementById('h-lessons').textContent=(d.adam?.lessons_n||0).toLocaleString();
    document.getElementById('h-skills').textContent=d.skills?.count||'—';
    document.getElementById('h-gpu').textContent=(d.gpu?.device_name||'').replace('AMD Radeon ','').replace(' Series','')||(d.gpu?.cuda_or_rocm?'gpu':'cpu');
    document.getElementById('h-tts').textContent=d.voice?.tts_backend||'none';
    if(d.skills?.names)renderSkills(d.skills.names);
    if(d.personas_known)renderPersonas(d.personas_known);
  }catch(e){
    document.getElementById('status-dot').classList.add('off');
    document.querySelector('.status-pill').classList.add('off');
    document.getElementById('status-label').textContent='offline';
  }
}

function renderSkills(names){
  document.getElementById('skills-count').textContent=names.length;
  const wrap=document.getElementById('skills-list');wrap.innerHTML='';
  names.forEach(n=>{
    const el=document.createElement('div');el.className='skill-row';
    el.innerHTML=`<code>${n}</code><span class="hint">try →</span>`;
    el.onclick=()=>{const i=document.getElementById('chat-input');i.focus();i.value=`use ${n}: `;};
    wrap.appendChild(el);
  });
}

function renderPersonas(list){
  const sel=document.getElementById('persona-select');
  while(sel.options.length>0)sel.remove(0);
  list.forEach(n=>{
    const opt=document.createElement('option');opt.value=n;opt.textContent=n;
    if(n===curPersona)opt.selected=true;
    sel.appendChild(opt);
  });
  sel.onchange=async()=>{
    const n=sel.value;
    try{
      await fetch(`${API}/persona`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n})});
      curPersona=n;
      document.getElementById('cur-persona-name').textContent=n;
      document.getElementById('persona-avatar').textContent=personaInitial(n);
      toast(`Persona → ${n}`);
    }catch(e){toast('persona switch failed','err');}
  };
}

function clearEmptyState(){const e=document.getElementById('empty-state');if(e)e.remove();}

function addMsg(role,text,meta){
  clearEmptyState();
  const log=document.getElementById('chat-log');
  const m=document.createElement('div');m.className='msg '+role;
  const whoLabel=role==='user'?'you':curPersona;
  m.innerHTML=`<div class="who">${whoLabel}</div><div class="body"></div>`+(meta?`<div class="meta">${meta}</div>`:'');
  const body=m.querySelector('.body');
  body._raw='';
  body._whoEl=m.querySelector('.who');
  body.update=(t,streaming)=>{
    body._raw=t;
    body.innerHTML=renderMarkdown(t)+(streaming?'<span class="cursor"></span>':'');
    attachCopyButtons(body);
    log.scrollTop=log.scrollHeight;
  };
  body.updateWho=(name)=>{if(body._whoEl)body._whoEl.textContent=name;};
  body.update(text||'',false);
  log.appendChild(m);
  log.scrollTop=log.scrollHeight;
  return body;
}

function addLoading(initialText){
  clearEmptyState();
  const log=document.getElementById('chat-log');
  const el=document.createElement('div');el.className='loading-msg';
  el.appendChild(document.createTextNode(initialText||'thinking…'));
  log.appendChild(el);log.scrollTop=log.scrollHeight;
  return el;
}

function clearActionRow(){
  if(window._curActionRow){
    window._curActionRow.classList.add('collapsing');
    const r=window._curActionRow;
    setTimeout(()=>{try{r.remove();}catch{}},500);
    window._curActionRow=null;
  }
}

function clearLoading(){
  if(window._curLoading){
    window._curLoading.classList.add('fading');
    const l=window._curLoading;
    setTimeout(()=>{try{l.remove();}catch{}},400);
    window._curLoading=null;
  }
}

document.getElementById('chat-form').onsubmit=async(e)=>{
  e.preventDefault();
  const input=document.getElementById('chat-input');const text=input.value.trim();if(!text)return;
  input.value='';
  addMsg('user',text);
  const body=addMsg('assistant','');
  body.update('',true);
  try{
    const r=await fetch(`${API}/chat/stream`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,session_id:session})});
    const reader=r.body.getReader();const dec=new TextDecoder();let buf='',acc='',ev='token';
    while(true){
      const {done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});
      let i;
      while((i=buf.indexOf('\n\n'))>=0){
        const chunk=buf.slice(0,i);buf=buf.slice(i+2);
        for(const ln of chunk.split('\n')){
          if(ln.startsWith('event:'))ev=ln.slice(6).trim();
          else if(ln.startsWith('data:')){
            const d=ln.slice(5).trim();
            if(ev==='token'){
              clearLoading();
              try{acc+=JSON.parse(d);body.update(acc,true);}catch{}
            } else if(ev==='thinking'){
              try{const t=JSON.parse(d);
                if(!window._curLoading)window._curLoading=addLoading('thinking…');
                while(window._curLoading.firstChild)window._curLoading.removeChild(window._curLoading.firstChild);
                window._curLoading.appendChild(document.createTextNode(`thinking ${t.elapsed||0}s · ${t.buf_chars||0} chars`));
              }catch{}
            } else if(ev==='web_lookup'){
              try{const w=JSON.parse(d);
                if(!window._curLoading)window._curLoading=addLoading('searching…');
                while(window._curLoading.firstChild)window._curLoading.removeChild(window._curLoading.firstChild);
                window._curLoading.appendChild(document.createTextNode(`searching: ${w.query||''}`));
              }catch{}
            } else if(ev==='web_supplement_done'){clearLoading();}
            else if(ev==='meta'){
              try{const m=JSON.parse(d);if(m.persona){curPersona=m.persona;document.getElementById('cur-persona-name').textContent=m.persona;document.getElementById('persona-avatar').textContent=personaInitial(m.persona);if(body&&body.updateWho)body.updateWho(m.persona);}}catch{}
            } else if(ev==='done'){
              try{const m=JSON.parse(d);
                clearActionRow();clearLoading();
                body.update(acc,false);
                const meta=document.createElement('div');meta.className='meta';
                meta.innerHTML=`<span class="tier-chip">${m.tier}</span><span>${m.wall_s}s</span>`;
                body.parentElement.appendChild(meta);
                document.getElementById('chat-log').scrollTop=document.getElementById('chat-log').scrollHeight;
                if(document.getElementById('speak-toggle')?.checked && acc.trim()){
                  speakText(acc.replace(/```[\s\S]*?```/g,'').replace(/\[Looked.*$/s,'').slice(0,800));
                }
              }catch{}
            } else if(ev.startsWith('agentic_')){
              try{
                const aobj=JSON.parse(d);
                if(!window._curActionRow && (ev==='agentic_step_start'||ev==='agentic_workspace_context'||ev==='agentic_plan_start')){
                  window._curActionRow=document.createElement('div');window._curActionRow.className='action-row';
                  document.getElementById('chat-log').appendChild(window._curActionRow);
                }
                if(ev==='agentic_workspace_context' && window._curActionRow){
                  const c=document.createElement('span');c.className='action-chip';
                  const s=aobj.summary||{};c.textContent=`workspace · ${s.git_branch||'-'} · ${(s.languages||[]).slice(0,2).join('/')||'?'}`;
                  window._curActionRow.appendChild(c);
                } else if(ev==='agentic_step_start' && window._curActionRow){
                  const c=document.createElement('span');c.className='action-chip';c.dataset.step=aobj.step;
                  const argkeys=Object.keys(aobj.args||{}).slice(0,2).map(k=>{const v=aobj.args[k];return typeof v==='string'?`${k}=${v.slice(0,16)}`:k}).join(', ');
                  c.textContent=`${aobj.tool}(${argkeys})`;
                  window._curActionRow.appendChild(c);
                } else if(ev==='agentic_step_result' && window._curActionRow){
                  const c=window._curActionRow.querySelector(`[data-step="${aobj.step}"]`);
                  if(c){c.textContent=`${c.textContent} ${aobj.ok?'✓':'✗'}`;c.classList.add('done');setTimeout(()=>{try{c.remove();}catch{}},900);}
                } else if((ev==='agentic_final'||ev==='agentic_auto_final')){clearActionRow();}
              }catch{}
            }
          }
        }
      }
    }
  }catch(e){body.innerHTML=`<span style="color:var(--err)">${e.message}</span>`;toast('chat error','err');}
};

async function recordAndSend(sec){
  if(!navigator.mediaDevices){toast('mic not available','err');return;}
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    document.getElementById('voice-status').textContent=`recording ${sec}s…`;
    document.getElementById('voice-status').classList.add('recording');
    const rec=new MediaRecorder(stream,{mimeType:'audio/webm'});const chunks=[];
    rec.ondataavailable=(e)=>chunks.push(e.data);
    rec.onstop=async()=>{
      stream.getTracks().forEach(t=>t.stop());
      document.getElementById('voice-status').classList.remove('recording');
      document.getElementById('voice-status').textContent='processing…';
      const blob=new Blob(chunks,{type:'audio/webm'});
      const buf=await blob.arrayBuffer();
      const b64=btoa(String.fromCharCode(...new Uint8Array(buf)));
      try{
        const payload={audio_base64:b64,session_id:session,return_audio:true};
        const v=document.getElementById('voice-pick').value;if(v)payload.voice=v;
        const r=await fetch(`${API}/voice/chat`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
        const d=await r.json();
        if(d.transcript)addMsg('user',d.transcript);
        if(d.response){
          const body=addMsg('assistant',d.spoken_text||d.response);
          const meta=document.createElement('div');meta.className='meta';
          meta.innerHTML=`<span class="tier-chip">${d.tier}</span><span>${d.wall_s}s</span>`;
          body.parentElement.appendChild(meta);
        }
        if(d.audio_base64){lastReplyAudio=d.audio_base64;playB64(d.audio_base64);}
        document.getElementById('voice-status').textContent='Ready';
      }catch(e){document.getElementById('voice-status').textContent='error';toast(e.message,'err');}
    };
    rec.start();setTimeout(()=>rec.stop(),sec*1000);
  }catch(e){toast('mic access denied','err');}
}

function playB64(b64){
  const bin=atob(b64);const arr=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
  const blob=new Blob([arr],{type:'audio/wav'});const url=URL.createObjectURL(blob);const a=new Audio(url);a.play();
}
async function speakText(text){
  if(!text||!text.trim())return;
  try{
    const args={text,session_id:session};const v=document.getElementById('voice-pick').value;if(v)args.voice=v;
    const r=await fetch(`${API}/skills/tts`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({args})});
    const d=await r.json();
    if(d.output?.audio_base64){lastReplyAudio=d.output.audio_base64;playB64(d.output.audio_base64);}
  }catch(e){console.error('speak error',e);}
}

document.getElementById('voice-rec').onclick=()=>recordAndSend(5);
document.getElementById('voice-rec-long').onclick=()=>recordAndSend(10);
document.getElementById('voice-replay').onclick=()=>{if(lastReplyAudio)playB64(lastReplyAudio);else toast('no reply yet','err');};
document.getElementById('voice-test').onclick=async()=>{
  const args={text:`Hello, this is your ${document.getElementById('voice-pick').value||curVoice||'default'} voice.`,session_id:session};
  const v=document.getElementById('voice-pick').value;if(v)args.voice=v;
  const r=await fetch(`${API}/skills/tts`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({args})});
  const d=await r.json();if(d.output?.audio_base64)playB64(d.output.audio_base64);
};

async function refreshSessions(){
  try{
    const r=await fetch(`${API}/sessions`);const d=await r.json();
    const list=(d.sessions||[]).slice(0,15);
    const wrap=document.getElementById('sessions-list');wrap.innerHTML='';
    if(list.length===0){
      wrap.innerHTML='<div class="empty-state" style="padding:20px 10px;font-size:11px"><span class="emoji" style="font-size:20px">◌</span>No sessions yet</div>';
      return;
    }
    list.forEach(s=>{
      const el=document.createElement('div');el.className='sess'+(s.session_id===session?' active':'');
      const sid=(s.session_id||'').slice(0,12);
      const ts=relTime(s.updated_ts||s.created_ts);
      const preview=(s.last_user_msg||s.first_msg||'…').slice(0,40);
      el.innerHTML=`<div class="sess-head"><span class="sess-id">${sid}</span><span class="sess-time">${ts}</span></div><div class="sess-preview">${escapeHtml(preview)}</div>`;
      el.onclick=async()=>{await loadSession(s.session_id);};
      wrap.appendChild(el);
    });
  }catch(e){}
}

async function loadSession(sid){
  try{
    const r=await fetch(`${API}/sessions/${sid}`);const d=await r.json();
    session=sid;
    document.getElementById('chat-log').innerHTML='';
    (d.turns||[]).forEach(t=>{
      if(t.role==='user')addMsg('user',t.content||'');
      else if(t.role==='assistant'){
        const body=addMsg('assistant',t.content||'');
        if(t.tier){const m=document.createElement('div');m.className='meta';m.innerHTML=`<span class="tier-chip">${t.tier}</span>`;body.parentElement.appendChild(m);}
      }
    });
    refreshSessions();
    toast(`Loaded session ${sid.slice(0,8)}`);
  }catch(e){toast('load failed','err');}
}

document.getElementById('sess-new').onclick=()=>{
  session='hud_'+Math.random().toString(36).slice(2,10);
  document.getElementById('chat-log').innerHTML='<div class="empty-state" id="empty-state"><span class="emoji">◆</span>Start a conversation with Adam.<br><small>Ask questions, build code, or chat by voice.</small></div>';
  refreshSessions();toast('New session');
};

async function loadVoices(){
  try{
    const r=await fetch(`${API}/skills/tts`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({args:{text:'x',list_voices:true}})});
    const d=await r.json();const voices=d.output?.voices||[];
    const sel=document.getElementById('voice-pick');
    while(sel.options.length>1)sel.remove(1);
    voices.filter(v=>v.backend==='piper').forEach(v=>{
      const opt=document.createElement('option');opt.value=v.alias||v.name;
      opt.textContent=`${v.alias||v.name} · ${(v.label||'').replace(/^(Female|Male) \(([A-Z]+)\)$/,'$1 $2')}`;
      sel.appendChild(opt);
    });
    sel.onchange=()=>{curVoice=sel.value||'auto';document.getElementById('cur-voice').textContent=curVoice;};
  }catch(e){}
}

refreshHealth();refreshSessions();loadVoices();
setInterval(refreshHealth,10000);
setInterval(refreshSessions,30000);
</script>
